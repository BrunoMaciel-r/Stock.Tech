<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Senha — Stock.Tech</title>
    <meta name="description" content="Crie sua senha para acessar o Stock.Tech.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../css/landing.css">
</head>

<body class="login-body">
    <div class="login-card">
        <a href="../../index.html" class="nav-logo" style="justify-content: center; margin-bottom: 1.5rem; text-decoration: none; display: flex; font-weight: 800; font-size: 1.5rem; color: #0f0f0f;">Stock<span style="color: #00C44C;">.Tech</span></a>

        <h2>Bem-vindo(a) à equipe!</h2>
        <p class="login-subtitle">Você foi convidado(a) para usar o Stock.Tech. Crie uma senha para ativar sua conta.
        </p>

        <form id="set-senha-form">
            <div class="form-error-global" id="form-error"></div>

            <div class="form-group" style="margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-weight: 700; font-size: 0.85rem;">Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required
                    style="width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #e0e0e0; font-family: inherit; font-size: 0.95rem;">
            </div>

            <div class="form-group" style="margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-weight: 700; font-size: 0.85rem;">Nova Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="senha" placeholder="Mínimo 4 caracteres" required
                        style="width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #e0e0e0; font-family: inherit; font-size: 0.95rem;">
                    <button type="button" class="toggle-password" data-target="senha" title="Mostrar senha">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-weight: 700; font-size: 0.85rem;">Confirmar Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmar-senha" placeholder="Repita a senha" required
                        style="width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid #e0e0e0; font-family: inherit; font-size: 0.95rem;">
                    <button type="button" class="toggle-password" data-target="confirmar-senha" title="Mostrar senha">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <div class="form-error-msg" id="error-senha-match">⚠ As senhas não coincidem</div>
            </div>

            <button type="submit" class="btn-green"
                style="width: 100%; padding: 14px; background: #00C44C; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-bottom: 1rem; font-size: 1rem; font-family: inherit; transition: all 0.25s;">Ativar
                Conta e Entrar</button>

            <p style="text-align: center; font-size: 0.85rem; color: #666;">
                <a href="../login/login.html" style="color: #666; font-weight: 500; text-decoration: underline;">Voltar
                    para o Login</a>
            </p>
        </form>
    </div>

    <script src="../../js/global.js"></script>
    <script src="./set-senha.js"></script>
</body>

</html>
