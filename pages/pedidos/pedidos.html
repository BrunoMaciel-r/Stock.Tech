<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedido de Vendas · Stock.tech</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="pedidos.css" />
</head>
<body>

    
    <div id="sidebar-container"></div>

    
    <div class="main-wrapper" id="main-wrapper">

        <div id="topbar-container"></div>
        <div id="modal-config-container"></div>

        
        <main class="page-content">
            <div class="pedidos-layout">
                <div class="col-main">
                    <div class="actions-bar">
                        <div class="search-box">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="search-vendas" placeholder="Pesquisar por cliente...">
                        </div>
                        <div class="filter-box">
                            <select id="filter-status" class="form-control" style="cursor:pointer; width:auto;">
                                <option value="todos">Todos os Status</option>
                                <option value="concluido">Concluído</option>
                                <option value="pendente">Pendente</option>
                            </select>
                        </div>
                    </div>

                    
                    <div class="card-table">
                        <div class="card-head">
                            <h3>Histórico de Vendas</h3>
                        </div>
                        <div class="table-wrap">
                            <table class="table-vendas" id="table-vendas">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Cliente</th>
                                        <th>Data</th>
                                        <th>Valor</th>
                                        <th>Pagamento</th>
                                        <th>Status</th>
                                        <th style="text-align:center;">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tbody-vendas">
                                    
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                
                <div class="col-side">
                    <div class="card-resumo">
                        <h3>Resumo do Histórico</h3>
                        <div class="resumo-item">
                            <span>Total de Pedidos</span>
                            <strong id="resumo-total-pedidos">0</strong>
                        </div>
                        <div class="resumo-item">
                            <span>Faturamento Total</span>
                            <strong id="resumo-faturamento">R$ 0,00</strong>
                        </div>
                    </div>

                    <button class="btn-primary" id="btn-nova-venda" style="width:100%; height:48px; border-radius:12px; margin-top:20px;">
                        <i class="fa-solid fa-plus"></i> Registrar Venda
                    </button>
                </div>
            </div>
        </main>
    </div>

    
    <div class="modal-overlay" id="modal-nova-venda">
        <div class="modal-box">
            <div class="modal-head">
                <h3>Registrar Nova Venda</h3>
                <button class="modal-close" id="btn-fechar-venda"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="modal-body">
                <form id="form-venda">
                    <div class="form-group">
                        <label class="form-label" for="venda-cliente">Cliente *</label>
                        <input type="text" class="form-control" id="venda-cliente" placeholder="Nome do cliente" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="venda-valor">Valor (R$) *</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="venda-valor" placeholder="0,00" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="venda-pagamento">Forma de Pagamento</label>
                            <select class="form-control" id="venda-pagamento">
                                <option value="Pix">Pix</option>
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Cartão de Crédito">Cartão de Crédito</option>
                                <option value="Cartão de Débito">Cartão de Débito</option>
                                <option value="Boleto">Boleto</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="venda-status">Status</label>
                        <select class="form-control" id="venda-status">
                            <option value="concluido">Concluído</option>
                            <option value="pendente">Pendente</option>
                        </select>
                    </div>
                </form>
            </div>

            <div class="modal-foot">
                <button class="btn-ghost" id="btn-cancelar-venda">Cancelar</button>
                <button class="btn-primary" id="btn-registrar-venda">Registrar Pedido</button>
            </div>
        </div>
    </div>

    
    <script src="../../js/global.js"></script>
    <script src="pedidos.js"></script>
</body>
</html>
