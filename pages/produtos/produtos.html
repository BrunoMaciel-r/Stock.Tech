<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos · Stock.tech</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="produtos.css" />
</head>
<body>

    
    <div id="sidebar-container"></div>

    
    <div class="main-wrapper" id="main-wrapper">

        <div id="topbar-container"></div>
        <div id="modal-config-container"></div>

        
        <main class="page-content">

            
            <div class="produtos-header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 20px; flex-wrap: wrap;">
                <div class="filtro-chips" id="filtroChips" style="margin-bottom: 0; flex: 1;">
                    <span class="filtro-chips-titulo"><i class="fa-solid fa-filter"></i> Categorias:</span>
                    <span class="chip active" data-categoria="todos">Todos</span>
                </div>

                <div class="produtos-acoes">
                    <a href="novo-produto.html" class="btn-primary" style="text-decoration:none; padding:12px 24px; border-radius:12px; display: inline-block; white-space: nowrap;">
                        <i class="fa-solid fa-plus"></i> Novo Produto
                    </a>
                </div>
            </div>

            <section class="produtos-body">
                
                <div class="produtos-grid" id="produtosGrid"></div>

            </section>
        </main>
    </div>

    
    <script src="../../js/global.js"></script>
    <script src="produtos.js"></script>
</body>
</html>
