<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos · Stock.tech</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="produtos.css" />
</head>
<body>

    <!-- Placeholders para Componentes Globais Injetados via JS -->
    <div id="sidebar-container"></div>

    <!-- Conteúdo Principal do Sistema (Wrapper) -->
    <div class="main-wrapper" id="main-wrapper">

        <div id="topbar-container"></div>
        <div id="modal-config-container"></div>

        <!-- LISTAGEM DE PRODUTOS -->
        <main class="page-content">

            <!-- Filtro de categorias (chips clicáveis, preenchido via JS) -->
            <div class="filtro-chips" id="filtroChips">
                <span class="filtro-chips-titulo"><i class="fa-solid fa-filter"></i> Categorias:</span>
                <span class="chip active" data-categoria="todos">Todos</span>
            </div>

            <section class="produtos-body">
                <!-- Grade de cards (inseridos dinamicamente via JS) -->
                <div class="produtos-grid" id="produtosGrid"></div>

                <!-- Coluna direita: novo produto -->
                <div class="produtos-acoes">
                    <a href="novo-produto.html" class="btn-primary" style="text-decoration:none; padding:12px 24px; border-radius:12px;">
                        <i class="fa-solid fa-plus"></i> Novo Produto
                    </a>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts JavaScript -->
    <script src="../../js/global.js"></script>
    <script src="produtos.js"></script>
</body>
</html>
